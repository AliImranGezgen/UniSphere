version: '3.8'

services:
  # 1. VERİTABANI (POSTGRESQL)
  db:
    image: postgres:15-alpine
    container_name: unisphere_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SecretPassword123!
      POSTGRES_DB: unisphere
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # 2. ARKA UÇ (BACKEND - .NET API)
  unisphere_api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: unisphere_api
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=unisphere;Username=postgres;Password=SecretPassword123!
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: always

  # 3. ÖN YÜZ (FRONTEND - VITE/REACT)
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: unisphere_web
    ports:
      - "3000:80"
    restart: always
    depends_on:
      - unisphere_api

volumes:
  pgdata: