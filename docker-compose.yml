version: '3.8'

services:
  # 1. VERİTABANI (POSTGRESQL)
  db:
    image: postgres:15-alpine
    container_name: unisphere_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SecretPassword123!
      POSTGRES_DB: unisphere
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. ARKA UÇ (BACKEND - .NET API)
  backend:
    build: 
      context: ./backend  # <-- DİKKAT: Ana dizinden backend klasörüne yönlendirdik
      dockerfile: Dockerfile
    container_name: unisphere_api
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=unisphere;Username=postgres;Password=SecretPassword123!
    ports:
      - "8080:8080"
    depends_on:
      - db

  # 3. ÖN YÜZ (FRONTEND)
  frontend:
    build: 
      context: ./frontend      # Docker'a frontend klasörüne gitmesini söylüyoruz
      dockerfile: Dockerfile   # Oradaki Dockerfile'ı kullan diyoruz
    container_name: unisphere_web
    ports:
      - "3000:80"              # Dış dünyadan 3000 ile gelindiğinde Docker içindeki 80'e (Nginx) bağlan
    restart: always
    depends_on:
      - unisphere_api          # Önce backend'in kalktığından emin ol
    networks:
      - unisphere_network      # Eğer network kullanıyorsan buraya ekle (varsayılan: default)

volumes:
  pgdata:
