version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: unisphere_db
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-unisphere}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-unisphere}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  unisphere_api:
    build:

      context: ./backend
      dockerfile: Dockerfile
    container_name: unisphere_api
    environment:


      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      # Eğer .env içerisinde özel DB host yoksa doğrudan "db" servisine bağlanır
      ConnectionStrings__DefaultConnection: Host=${DB_HOST:-db};Port=${DB_PORT:-5432};Database=${POSTGRES_DB:-unisphere};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-03042026Van!}
      # JWT için fallback değerler (.env eksikse çökmesini engellemek için)
      Jwt__Key: ${JWT_KEY:-BuCokGizliVeUzunBirSifreOlmali123456!}
      Jwt__Issuer: ${JWT_ISSUER:-UniSphereAPI}
      Jwt__Audience: ${JWT_AUDIENCE:-UniSphereUsers}
      Jwt__ExpireMinutes: ${JWT_EXPIRE_MINUTES:-60}
    ports:
      - "8085:8080"

    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: unisphere_web
    ports:
      - "3000:80"
    depends_on:
      - unisphere_api
    restart: always

volumes:
  pgdata: