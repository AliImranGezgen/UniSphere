name: UniSphere Continuous Deployment (CD)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: SSH ile Sunucuya Bağlan ve Deploy Et
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            echo "--- DAGITIM BASLADI ---"

            cd ~/UniSphere || exit 1

            echo "1. Mevcut branch:"
            git branch --show-current

            echo "2. GitHub'dan en guncel kodlar cekiliyor..."
            git fetch --all
            git reset --hard origin/main

            echo "3. Guncel commit:"
            git log --oneline -n 1

            echo "4. Frontend package.json kontrolu:"
            grep '"@eslint/js"' frontend/package.json || true
            grep '"eslint"' frontend/package.json || true

            echo "5. Frontend yeniden build ediliyor..."
            docker-compose up -d --build frontend

            echo "6. Backend yeniden build ediliyor..."
            docker-compose up -d --build unisphere_api

            echo "7. Konteyner durumlari:"
            docker ps

            echo "8. Son log kontrolu (API):"
            docker-compose logs --tail=30 unisphere_api || true

            echo "9. Son log kontrolu (Frontend):"
            docker-compose logs --tail=30 frontend || true

            echo "10. Temizlik: Kullanilmayan eski imajlar siliniyor..."
            docker image prune -f

            echo "--- DAGITIM BASARIYLA TAMAMLANDI ---"
