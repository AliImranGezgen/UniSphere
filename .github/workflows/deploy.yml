name: UniSphere Continuous Deployment (CD)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: SSH ile Sunucuya Bağlan ve Deploy Et
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            echo "--- DAGITIM BASLADI ---"

            cd ~/UniSphere || exit 1

            echo "1. Mevcut branch:"
            git branch --show-current

            echo "2. GitHub'dan en guncel kodlar cekiliyor..."
            git fetch --all
            git reset --hard origin/main

            echo "3. Guncel commit:"
            git log --oneline -n 1

            echo "4. Frontend package.json kontrolu:"
            grep '"@eslint/js"' frontend/package.json || true
            grep '"eslint"' frontend/package.json || true

            echo "5. Frontend image build ediliyor..."
            docker compose build frontend

            echo "6. Frontend eski container kalintilari temizleniyor..."
            docker ps -aq --filter "name=unisphere_web" | xargs -r docker rm -f
            docker ps -aq --filter "name=frontend" | xargs -r docker rm -f

            echo "7. Frontend yeniden ayağa kaldırılıyor..."
            docker compose up -d --no-deps frontend

            echo "8. Backend image build ediliyor..."
            docker compose build unisphere_api

            echo "9. Backend eski container kalintilari temizleniyor..."
            docker ps -aq --filter "name=unisphere_api" | xargs -r docker rm -f

            echo "10. Backend yeniden ayağa kaldırılıyor..."
            docker compose up -d --no-deps unisphere_api

            echo "11. Orphan / kullanilmayan container temizligi..."
            docker container prune -f

            echo "12. Konteyner durumlari:"
            docker ps

            echo "13. Frontend loglari:"
            docker compose logs --tail=30 frontend || true

            echo "14. Backend loglari:"
            docker compose logs --tail=30 unisphere_api || true

            echo "15. Kullanilmayan image temizligi:"
            docker image prune -f

            echo "--- DAGITIM BASARIYLA TAMAMLANDI ---"
