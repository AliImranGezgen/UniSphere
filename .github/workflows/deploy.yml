name: UniSphere Continuous Deployment (CD)

on:
  push:
    branches: [ "main" ] # Sadece main dalına kod gönderildiğinde çalışır

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Kodları GitHub'dan al (Checkout)
      - name: Checkout Source Code
        uses: actions/checkout@v3

      # 2. Sunucuya bağlan ve Docker komutlarını çalıştır
      - name: SSH ile Sunucuya Baglan ve Guncelle
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          # Buradaki girintilere (boşluklara) dikkat etmelisin:
          script: |
            echo "--- TEMİZLİK VE GÜNCELLEME BAŞLADI ---"
            cd /root/UniSphere || exit
            
            # Sunucudaki yerel değişiklikleri (varsa) çöpe at ve ana daldaki kodu zorla çek
            git fetch --all
            git reset --hard origin/main
            
            # Dosyanın güncellendiğini loglarda görmek için:
            cat frontend/package.json
            
            # Docker'ı sıfırdan ayağa kaldır
            docker-compose down
            docker-compose up -d --build
